<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单HTML网页</title>
</head>

<body>
  <!-- 网页标题 -->
  <h1>欢迎来到我的网页</h1>
  <!-- 段落文本 -->
  <p>这是一个用HTML构建的简单网页示例。在这里，你可以看到一些文本、一张图片和链接。</p>
  <!-- 图片展示，这里使用了一个网络图片链接，你可以替换为自己的图片路径 -->
  <img src="https://pic2.zhimg.com/v2-f9d869c897d8c85558d9c69d16801872_r.jpg" alt="示例图片">
  <!-- 链接 -->
  <a href="https://www.baidu.com">访问百度</a>
</body>

</html>
